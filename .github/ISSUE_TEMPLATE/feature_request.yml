name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note the project's scope: passive, ToS-safe, market + your own account data
        only. Ideas that need radar/ESP, memory reading, injection, or automation are
        out of scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
