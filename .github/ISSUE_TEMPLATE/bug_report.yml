name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** file security issues here — see
        [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Do '...'
        3. See '...'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. v0.1.0 (or a commit SHA)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant output. Do not paste account credentials or personal data.
