name: release

# Builds per-OS binaries and attaches them to the GitHub Release for a version tag.
# Triggered only on tag push (rare, deliberate) — normal pushes/PRs rely on the local
# git gates instead, so day-to-day work spends no CI minutes.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create/update the release and upload assets

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # a failure on one OS must not block the others
      matrix:
        include:
          - os: macos-latest
            label: macos
            tags: "pcap"
            primary: true
          - os: ubuntu-latest
            label: linux
            tags: "pcap webkit2_41"
            primary: false
          - os: windows-latest
            label: windows
            tags: ""
            primary: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libpcap-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: cmd/albion-ledger
        shell: bash
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            wails build -tags "${{ matrix.tags }}"
          else
            wails build
          fi

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: zip -r -y "albion-ledger-macos.zip" "albion-ledger.app"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: Compress-Archive -Path "albion-ledger.exe" -DestinationPath "albion-ledger-windows.zip"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: zip "albion-ledger-linux.zip" "albion-ledger"

      # Only the primary (macOS) job writes the release notes, so parallel matrix jobs
      # don't race to append the same body. Other jobs upload their asset only.
      - name: Upload with release notes
        if: matrix.primary
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/albion-ledger/build/bin/albion-ledger-${{ matrix.label }}.zip
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for what changed.

            **Platform support**
            - **macOS** — live-verified.
            - **Linux** — experimental; capture path (`cap_net_raw` / libpcap) not yet verified.
            - **Windows** — build-only preview; capture support pending.

            Live capture needs elevated network-capture privileges. See the README.

      - name: Upload asset only
        if: ${{ !matrix.primary }}
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/albion-ledger/build/bin/albion-ledger-${{ matrix.label }}.zip
