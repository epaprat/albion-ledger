name: release

# Builds per-OS binaries and attaches them to the GitHub Release for a version tag.
# Triggered ONLY on tag push (rare, deliberate) — normal pushes/PRs run local gates,
# not CI, so no minutes are burned on day-to-day work (constitution XIII/XIV).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create/update the release and upload assets

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # a failure on one OS must not block the others
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Linux needs the WebKitGTK stack for the Wails webview.
      - name: Install Linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: cmd/albion-ledger
        run: wails build -tags pcap

      # Package the built artifact under a per-OS name for the release.
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: |
          zip -r -y "albion-ledger-macos.zip" "albion-ledger.app"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: Compress-Archive -Path "albion-ledger.exe" -DestinationPath "albion-ledger-windows.zip"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: cmd/albion-ledger/build/bin
        run: zip "albion-ledger-linux.zip" "albion-ledger"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/albion-ledger/build/bin/albion-ledger-${{ matrix.label }}.zip
          # Honest platform-support note attached to the release.
          body: |
            ## Albion Ledger ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for what changed.

            **Platform support**
            - **macOS** — live-verified.
            - **Windows / Linux** — builds; capture path (Npcap / `cap_net_raw`) not yet
              verified. Treat as **experimental**.

            Live capture needs elevated network-capture privileges. See the README.
          append_body: true
